<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwersGPT</title>
<link rel="icon" href="https://i.hizliresim.com/82fpag2.png">
<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f5f7; color:#1d1d1f;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,0.05);position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.brand img{width:38px;}
select,button{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:14px;}
button{background:#0071e3;color:#fff;border:none;cursor:pointer;transition:.2s;}
button:hover{opacity:.9;}
.reset{background:#ff3b30;}
.container{max-width:900px;margin:20px auto;padding:0 15px;}
.card{background:#fff;padding:22px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.05);margin-bottom:25px;}
.option{padding:10px 12px;border-radius:10px;margin-top:8px;border:1px solid #e5e5e7;cursor:pointer;transition:.2s;}
.option:hover{background:#f2f2f7;}
.correct{background:#e6f0ff;border-color:#0071e3;color:#0071e3;}
.wrong{background:#ffe5e5;border-color:#ff3b30;color:#ff3b30;}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;justify-content:center;align-items:center;}
#modalBox{background:white;padding:30px;border-radius:16px;width:320px;text-align:center;}
#modalBox input{width:100%;padding:10px;margin-top:10px;}
.extra-btns{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>

<div id="modal">
  <div id="modalBox">
    <h3>Groq API Key</h3>
    <input id="apiInput" placeholder="API Key">
    <br><br>
    <button onclick="saveKey()">Kaydet</button>
  </div>
</div>

<div class="topbar">
  <div class="left">
    <div class="brand">
      <img src="https://i.hizliresim.com/82fpag2.png">
      SwersGPT
    </div>

    <select id="grade" onchange="updateSubjects()">
      <option value="">Sınıf</option>
      <option>5</option><option>6</option><option>7</option><option>8</option>
      <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>

    <select id="subject"><option value="">Ders</option></select>

    <button onclick="generate()">Soruları Üret</button>

    <div class="extra-btns">
      <button onclick="openSwers()">SwersGPT</button>
      <button onclick="showInfo()">Bilgilendirme</button>
      <button onclick="showAbout()">Hakkımızda</button>
    </div>
  </div>

  <button class="reset" onclick="resetKey()">API Key Sıfırla</button>
</div>

<div class="container" id="questions"></div>

<script>
let API_KEY = localStorage.getItem("api_key");
if(API_KEY) document.getElementById("modal").style.display="none";

function saveKey(){
  const v=document.getElementById("apiInput").value.trim();
  if(!v) return alert("Lütfen API Key girin!");
  localStorage.setItem("api_key",v);
  API_KEY=v;
  document.getElementById("modal").style.display="none";
}

function resetKey(){
  localStorage.removeItem("api_key");
  location.reload();
}

function updateSubjects(){
  const grade=document.getElementById("grade").value;
  const subject=document.getElementById("subject");
  subject.innerHTML="<option value=''>Ders</option>";
  let list=[];
  if(["5","6","7","8"].includes(grade)){
    list=["Matematik","Türkçe","Fen Bilimleri","Sosyal Bilgiler","İngilizce","Din Kültürü"];
  }else{
    list=["Matematik","Türkçe","Fizik","Kimya","Biyoloji","Tarih","Coğrafya","İngilizce","Din Kültürü"];
  }
  list.forEach(d=>{
    const o=document.createElement("option");
    o.textContent=d;
    subject.appendChild(o);
  });
}

async function generate(){
  if(!API_KEY) return alert("Önce API Key girin!");
  const grade=document.getElementById("grade").value;
  const subject=document.getElementById("subject").value;
  if(!grade||!subject) return alert("Sınıf ve ders seçin!");

  const container=document.getElementById("questions");
  container.innerHTML="Yükleniyor...";

  const prompt=`
Sen MEB müfredatına tam hakim, dikkatli ve hata yapmayan uzman bir öğretmensin.

${grade}. sınıf ${subject} dersi için
MEB kazanımlarına %100 uygun
5 adet çoktan seçmeli soru üret.

Kurallar:
- Tamamen Türkçe olacak.
- 4 şık (A,B,C,D).
- Yalnızca 1 doğru cevap.
- Doğru cevap kesin doğru olacak.
- JSON dışında hiçbir şey yazma.

FORMAT:
[
{
"question":"...",
"options":["A) ...","B) ...","C) ...","D) ..."],
"answer":"A"
}
]
`;

  try{
    const response=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"llama-3.3-70b-versatile",
        temperature:0.2,
        top_p:0.9,
        messages:[
          {role:"system",content:"Resmi, ciddi ve hatasız üretim yap. JSON formatını bozma."},
          {role:"user",content:prompt}
        ]
      })
    });

    const data=await response.json();
    const raw=data.choices[0].message.content.replace(/```json/g,"").replace(/```/g,"").trim();
    const questions=JSON.parse(raw);

    container.innerHTML="";
    questions.forEach((q,i)=>createCard(i+1,q));

  }catch(e){
    container.innerHTML="Hata oluştu";
  }
}

function createCard(no,q){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${no}. ${q.question}</h3>`;
  q.options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.textContent=opt;
    div.onclick=()=>{
      if(card.classList.contains("locked"))return;
      card.classList.add("locked");
      const selected=opt.charAt(0);
      if(selected===q.answer){div.classList.add("correct");}
      else{
        div.classList.add("wrong");
        Array.from(card.getElementsByClassName("option")).forEach(o=>{
          if(o.textContent.charAt(0)===q.answer){o.classList.add("correct");}
        });
      }
    };
    card.appendChild(div);
  });
  document.getElementById("questions").appendChild(card);
}

function openSwers(){
  window.open("https://swersgpt.github.io","_blank");
}

function showInfo(){
  alert("SwersGPT hata yapabilir. Soruların doğruluğunu kontrol etmeniz önerilir.");
}

function showAbout(){
  alert("SwersGPT kendi başına bir model değildir. İşbirliği için swersgpt@gmail.com");
}
</script>

</body>
</html>
